version: '3.8'

services:
  aigerus-backend:
    image: aigerus-backend:latest
    container_name: aigerus-backend
    restart: always
    ports:
      - 3000:3000
    environment:
      - MONGO_URI=${MONGO_URI}
      - PORT=3000
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - NODE_ENV=production
